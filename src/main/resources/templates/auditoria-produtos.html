<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auditoria de Produtos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container">
        <a class="navbar-brand" href="/produtos">FATEC Catálogo</a>

        <div class="d-flex align-items-center">
            <span class="navbar-text text-white me-3" sec:authorize="isAuthenticated()">
                Olá, <strong sec:authentication="name">Usuário</strong>
            </span>
            <a class="btn btn-light btn-sm" th:href="@{/produtos}">Voltar aos Produtos</a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="card shadow">
        <div class="card-header bg-white d-flex justify-content-between align-items-center">
            <div>
                <h2 class="mb-0">Auditoria de Produtos</h2>
                <small class="text-muted">Cada alteração gera um registro permanente com o tipo da operação.</small>
            </div>
        </div>
        <div class="card-body">
            <table class="table table-hover align-middle">
                <thead class="table-dark">
                <tr>
                    <th>Auditoria</th>
                    <th>ID Produto</th>
                    <th>Nome</th>
                    <th>Categoria</th>
                    <th>Tipo</th>
                    <th>Preço (R$)</th>
                    <th>Estoque</th>
                    <th>Registrado em</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="a : ${auditorias}">
                    <td th:text="${a.idAuditoria}"></td>
                    <td th:text="${a.idProdutoOriginal}"></td>
                    <td th:text="${a.nome}"></td>
                    <td th:text="${a.categoriaNome != null ? a.categoriaNome : 'Sem Categoria'}"></td>
                    <td>
                        <span class="badge"
                              th:classappend="${a.tipoAlteracao.name() == 'CREATE'} ? ' bg-success' : (${a.tipoAlteracao.name() == 'UPDATE'} ? ' bg-primary' : ' bg-danger')"
                              th:text="${a.tipoAlteracao}"></span>
                    </td>
                    <td th:text="${#numbers.formatDecimal(a.valor, 1, 'POINT', 2, 'COMMA')}"></td>
                    <td th:text="${a.quantidade}"></td>
                    <td th:text="${a.dataOperacao != null ? #temporals.format(a.dataOperacao, 'dd/MM/yyyy HH:mm') : '-'}"></td>
                </tr>
                </tbody>
            </table>

            <div th:if="${#lists.isEmpty(auditorias)}" class="alert alert-info text-center">
                Nenhuma alteração registrada na auditoria.
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
